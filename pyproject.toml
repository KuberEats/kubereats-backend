[project]
name = "kubereats-backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "alembic>=1.18.4",
    "celery>=5.6.3",
    "fastapi>=0.136.1",
    "fpdf2>=2.8.7",
    "psycopg2-binary>=2.9.12",
    "pydantic>=2.13.4",
    "python-dotenv>=1.2.2",
    "redis>=7.4.0",
    "sqlalchemy>=2.0.49",
    "uvicorn>=0.46.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.14.0",
    "httpx>=0.28.1",
]

[tool.pytest.ini_options]
addopts = [
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=xml",
]
pythonpath = ["."]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
relative_files = true
source = ["app"]

[tool.coverage.report]
show_missing = true
skip_empty = true
