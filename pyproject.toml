[project]
name = "kubereats-backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.1",
    "google-cloud-pubsub>=2.32.0",
    "google-cloud-tasks>=2.22.0",
    "pika>=1.4.1",
    "psycopg2-binary>=2.9.12",
    "pydantic-settings>=2.14.0",
    "python-dotenv>=1.2.2",
    "requests>=2.34.2",
    "sqlalchemy>=2.0.49",
    "uvicorn>=0.46.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.12",
]

[tool.pytest.ini_options]
addopts = [
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=xml",
]
pythonpath = ["."]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
relative_files = true
source = ["app"]

[tool.coverage.report]
show_missing = true
skip_empty = true
