[project]
name = "committee-service"
version = "0.1.0"
description = "KuberEats Committee Service"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.1",
    "psycopg2-binary>=2.9.12",
    "pydantic-settings>=2.7.0",
    "sqlalchemy>=2.0.49",
    "uvicorn>=0.46.0",
    "pyjwt>=2.10.0",
    "prometheus-client>=0.21.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.12",
]

[tool.pytest.ini_options]
addopts = [
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=xml",
]
pythonpath = ["."]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
relative_files = true
source = ["app"]

[tool.coverage.report]
show_missing = true
skip_empty = true
