sonar.projectKey=kubereats-recommendation-service
sonar.projectName=KuberEats Recommendation Service
sonar.projectVersion=0.1.0

sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

sonar.sources=app
sonar.tests=tests,test
sonar.test.inclusions=tests/**/*.py,test/**/*.ts
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=\
  **/__pycache__/**,\
  .venv/**,\
  .pytest_cache/**,\
  .ruff_cache/**,\
  node_modules/**
