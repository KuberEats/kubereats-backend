apiVersion: v1
kind: Service
metadata:
  name: kube-prometheus-stack-prometheus-federation
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kube-prometheus-stack-prometheus-federation
    app.kubernetes.io/part-of: kubereats-monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: kube-prometheus-stack-prometheus
  ports:
    - name: http-web
      port: 9090
      targetPort: 9090
      protocol: TCP
      nodePort: 30990
