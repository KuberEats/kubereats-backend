apiVersion: v1
kind: Service
metadata:
  name: patroni-pg1
  labels:
    app.kubernetes.io/name: patroni
    app.kubernetes.io/component: db-network-probe
    env: dev
    cluster: kubereats-postgres
    component: postgres-ha
    node: pg1
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8008
      targetPort: 8008
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: patroni-pg1
  labels:
    app.kubernetes.io/name: patroni
    app.kubernetes.io/component: db-network-probe
    env: dev
    cluster: kubereats-postgres
    component: postgres-ha
    node: pg1
    kubernetes.io/service-name: patroni-pg1
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8008
endpoints:
  - addresses:
      - 192.168.16.221
    conditions:
      ready: true
---
