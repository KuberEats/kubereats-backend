# Cluster-local monitoring for the Kubereats Kubernetes cluster.
# The central monitoring VM at 10.250.0.4 remains the main dashboard and alert entry point.

namespaceOverride: monitoring

crds:
  enabled: true

defaultRules:
  create: true

grafana:
  enabled: false

alertmanager:
  enabled: true
  service:
    type: ClusterIP
  alertmanagerSpec:
    retention: 120h

prometheus:
  service:
    type: NodePort
    nodePort: 30990
  prometheusSpec:
    retention: 7d
    scrapeInterval: 30s
    evaluationInterval: 30s
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    probeSelector: {}
    probeNamespaceSelector: {}
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelector: {}
    scrapeConfigNamespaceSelector: {}
    scrapeConfigSelectorNilUsesHelmValues: false
    serviceDiscoveryRole: EndpointSlice

    additionalScrapeConfigs:
      - job_name: patroni
        metrics_path: /metrics
        static_configs:
          - targets:
              - 192.168.16.221:8008
            labels:
              env: dev
              cluster: kubereats-postgres
              component: postgres-ha
              node: pg1
          - targets:
              - 192.168.16.222:8008
            labels:
              env: dev
              cluster: kubereats-postgres
              component: postgres-ha
              node: pg2
          - targets:
              - 10.250.0.3:8008
            labels:
              env: dev
              cluster: kubereats-postgres
              component: postgres-ha
              node: pg3

      - job_name: postgres-exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - 192.168.16.221:9187
            labels:
              env: dev
              cluster: kubereats-postgres
              component: postgres-exporter
              node: pg1
          - targets:
              - 192.168.16.222:9187
            labels:
              env: dev
              cluster: kubereats-postgres
              component: postgres-exporter
              node: pg2
          - targets:
              - 10.250.0.3:9187
            labels:
              env: dev
              cluster: kubereats-postgres
              component: postgres-exporter
              node: pg3

      - job_name: db-node-exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - 192.168.16.221:9100
            labels:
              env: dev
              cluster: kubereats-postgres
              component: db-node-exporter
              node: pg1
          - targets:
              - 192.168.16.222:9100
            labels:
              env: dev
              cluster: kubereats-postgres
              component: db-node-exporter
              node: pg2
          - targets:
              - 10.250.0.3:9100
            labels:
              env: dev
              cluster: kubereats-postgres
              component: db-node-exporter
              node: pg3
    storageSpec: {}

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true
    probes: true

kubeApiServer:
  enabled: true

kubeControllerManager:
  enabled: true

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true
