# Cluster-local monitoring for the Kubereats Kubernetes cluster.
# The central monitoring VM at 10.250.0.4 remains the main dashboard and alert entry point.

namespaceOverride: monitoring

crds:
  enabled: true

defaultRules:
  create: true

grafana:
  enabled: false

alertmanager:
  enabled: true
  service:
    type: ClusterIP
  alertmanagerSpec:
    retention: 120h

prometheus:
  service:
    type: ClusterIP
  prometheusSpec:
    retention: 7d
    scrapeInterval: 30s
    evaluationInterval: 30s
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    probeSelector: {}
    probeNamespaceSelector: {}
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelector: {}
    scrapeConfigNamespaceSelector: {}
    scrapeConfigSelectorNilUsesHelmValues: false
    storageSpec: {}

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true
    probes: true

kubeApiServer:
  enabled: true

kubeControllerManager:
  enabled: true

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true
