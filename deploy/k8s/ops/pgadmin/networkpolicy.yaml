apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgadmin-internal-access
  namespace: db-tools
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: kubereats
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.16.0/20
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 10.96.0.0/12
        - ipBlock:
            cidr: 192.168.16.0/20
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 5433
