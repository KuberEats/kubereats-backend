apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  labels:
    app.kubernetes.io/name: sonarqube
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: code-quality
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarqube
      app.kubernetes.io/part-of: kubereats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarqube
        app.kubernetes.io/part-of: kubereats
        app.kubernetes.io/component: code-quality
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: configure-sonarqube-sysctl
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              sysctl -w vm.max_map_count=524288
              sysctl -w fs.file-max=131072
          securityContext:
            privileged: true
            runAsUser: 0
      containers:
        - name: sonarqube
          image: sonarqube:26.5.0.122743-community
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: SONAR_ES_BOOTSTRAP_CHECKS_DISABLE
              value: "true"
          startupProbe:
            httpGet:
              path: /api/system/status
              port: http
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/system/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/system/status
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /opt/sonarqube/data
            - name: extensions
              mountPath: /opt/sonarqube/extensions
            - name: logs
              mountPath: /opt/sonarqube/logs
            - name: temp
              mountPath: /opt/sonarqube/temp
      volumes:
        - name: data
          emptyDir: {}
        - name: extensions
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: temp
          emptyDir: {}
