apiVersion: v1
kind: Secret
metadata:
  name: verification-secret
  labels:
    app.kubernetes.io/name: verification
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://user:password@postgres.example.internal:5432/kubereats
  JWT_SECRET_KEY: replace-with-shared-jwt-secret
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_USERNAME: replace-with-smtp-username
  SMTP_PASSWORD: replace-with-smtp-password
  MAILGUN_API_KEY: replace-with-mailgun-api-key
  MAILGUN_DOMAIN: mg.example.com
