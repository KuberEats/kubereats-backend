apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tagging-service
  labels:
    app.kubernetes.io/name: tagging-service
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: backend
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tagging-service
      app.kubernetes.io/part-of: kubereats
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
