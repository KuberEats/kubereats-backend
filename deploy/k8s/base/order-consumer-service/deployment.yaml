apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-consumer-service
  labels:
    app.kubernetes.io/name: order-consumer-service
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-consumer-service
      app.kubernetes.io/part-of: kubereats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-consumer-service
        app.kubernetes.io/part-of: kubereats
        app.kubernetes.io/component: worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/kubereats/order-consumer-service:dev
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9100
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kubereats-db-app
                  key: DATABASE_URL
            - name: ORDER_CONSUMER_METRICS_ADDRESS
              value: "0.0.0.0"
            - name: ORDER_CONSUMER_METRICS_PORT
              value: "9100"
          envFrom:
            - configMapRef:
                name: order-consumer-service-config
            - secretRef:
                name: order-consumer-service-secret
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
