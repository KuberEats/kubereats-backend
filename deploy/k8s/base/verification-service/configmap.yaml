apiVersion: v1
kind: ConfigMap
metadata:
  name: verification-service-config
data:
  APP_ENV: dev
  LOG_LEVEL: info
  PORT: "8000"
  SERVICE_NAME: verification
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  AUTO_CREATE_TABLES: "true"
  JWT_ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  SMTP_HOST: ""
  SMTP_PORT: "587"
  MAILGUN_DOMAIN: ""
