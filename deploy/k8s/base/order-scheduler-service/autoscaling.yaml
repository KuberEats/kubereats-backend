apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-scheduler-service
  labels:
    app.kubernetes.io/name: order-scheduler-service
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    name: order-scheduler-service
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
        metricName: order_scheduler_service_cpu_cores
        threshold: "0.25"
        activationThreshold: "0.05"
        query: |
          sum(rate(container_cpu_usage_seconds_total{namespace="kubereats-dev", pod=~"order-scheduler-service-.*", container!="", container!="POD"}[2m])) or on() vector(0)
