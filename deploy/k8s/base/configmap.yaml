apiVersion: v1
kind: ConfigMap
metadata:
  name: verification-config
  labels:
    app.kubernetes.io/name: verification
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: backend
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "8000"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  AUTO_CREATE_TABLES: "true"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
