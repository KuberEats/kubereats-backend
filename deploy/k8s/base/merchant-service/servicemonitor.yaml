apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: merchant-service
  labels:
    app.kubernetes.io/name: merchant-service
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: backend
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: merchant-service
      app.kubernetes.io/part-of: kubereats
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: merchant-service-alerts
  labels:
    app.kubernetes.io/name: merchant-service
    app.kubernetes.io/part-of: kubereats
    app.kubernetes.io/component: backend
    release: kube-prometheus-stack
spec:
  groups:
    - name: kubereats.merchant-service
      rules:
        - alert: KubereatsMerchantServiceTargetDown
          expr: up{service="merchant-service"} == 0
          for: 5m
          labels:
            severity: critical
            service: merchant-service
          annotations:
            summary: Merchant Service metrics target is down
            description: Prometheus cannot scrape Merchant Service metrics for pod {{ $labels.pod }}.

        - alert: KubereatsMerchantServicePodUnavailable
          expr: kube_deployment_status_replicas_available{deployment="merchant-service"} < 1
          for: 5m
          labels:
            severity: critical
            service: merchant-service
          annotations:
            summary: Merchant Service has no available pods
            description: Merchant Service deployment has no available replicas for at least 5 minutes.

        - alert: KubereatsMerchantRequestLatencyHigh
          expr: histogram_quantile(0.95, sum(rate(merchant_request_duration_seconds_bucket[10m])) by (le)) > 1
          for: 10m
          labels:
            severity: warning
            service: merchant-service
          annotations:
            summary: Merchant Service request latency is high
            description: Merchant Service p95 request latency has exceeded 1 second for at least 10 minutes.
