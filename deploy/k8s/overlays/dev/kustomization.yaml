apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubereats-dev
resources:
  - namespace.yaml
  - merchant-service
  - committee-service
  - verification-service
  - tagging-service
  - finance-service
  - recommendation-service
  - order-scheduler-service
# Recommendation service is exposed in dev on NodePort 31086.
# Order scheduler service is exposed in dev on NodePort 31087.
# Keep these services out of dev sync until their images, secrets, and dependencies are ready:
# - notification-service
# - employee-order
# ingress.example.yaml is optional and intentionally not included.
