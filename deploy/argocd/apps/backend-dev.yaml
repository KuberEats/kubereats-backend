apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubereats-backend-dev
  namespace: argocd
spec:
  project: kubereats
  source:
    repoURL: https://github.com/KuberEats/kubereats-backend.git
    targetRevision: main
    path: deploy/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: kubereats-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
