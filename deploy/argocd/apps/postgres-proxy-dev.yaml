apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubereats-postgres-proxy-dev
  namespace: argocd
spec:
  project: kubereats
  source:
    repoURL: https://github.com/KuberEats/kubereats-IaC.git
    targetRevision: main
    path: k8s/postgres-proxy
  destination:
    server: https://kubernetes.default.svc
    namespace: kubereats-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
