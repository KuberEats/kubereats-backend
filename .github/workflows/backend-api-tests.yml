name: Backend API Tests

on:
  push:
    branches:
      - module/order-scheduler

jobs:
  backend-api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kubereats
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kubereats"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kubereats
      KUBEREATS_DB_RESET_MODE: local

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend Python dependencies
        run: uv sync

      - name: Start backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend test dependencies
        run: npm ci --omit=optional

      - name: Run backend API tests
        run: npm test
