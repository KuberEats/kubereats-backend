name: Backend API Tests

on:
  push:
    branches:
      - module/recommend
  pull_request:
    branches:
      - module/recommend

jobs:
  backend-api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kubereats
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kubereats"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kubereats
      KUBEREATS_DB_RESET_MODE: local
      BACKEND_API_BASE_URL: http://localhost:8000
      OPENROUTER_API_KEY: ""
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend Python dependencies
        run: uv sync

      - name: Seed recommendation test data
        run: uv run python create_dummy_data.py

      - name: Start backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend test dependencies
        run: npm install

      - name: Run backend quality checks
        run: npm run quality

      - name: Run backend API tests
        run: npm test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemini-3.1-flash-lite' }}

      - name: Run SonarScanner
        if: ${{ env.SONAR_TOKEN != '' }}
        run: npm run sonar

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi
          pkill -f "uvicorn app.main:app" || true
