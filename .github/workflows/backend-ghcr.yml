name: Backend GHCR Images

on:
  pull_request:
  push:
    branches:
      - main
      - "infra/**"
      - "module/**"
    paths-ignore:
      - "deploy/k8s/overlays/dev/**/kustomization.yaml"

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: backend-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-services:
    name: Resolve services to build
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.resolve.outputs.include }}
      has_services: ${{ steps.resolve.outputs.has_services }}
    steps:
      - name: Select services for this ref
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          all_services='[{"service":"merchant-service","source_ref":"module/merchant","image_name":"merchant-service","overlay":"merchant-service"},{"service":"committee-service","source_ref":"module/fuwei-system","image_name":"committee-service","overlay":"committee-service"},{"service":"verification-service","source_ref":"module/verification","image_name":"kubereats-verification","overlay":"verification-service"}]'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ref="${{ github.head_ref }}"
          else
            ref="${{ github.ref_name }}"
          fi

          case "$ref" in
            module/merchant)
              include='[{"service":"merchant-service","source_ref":"module/merchant","image_name":"merchant-service","overlay":"merchant-service"}]'
              ;;
            module/fuwei-system)
              include='[{"service":"committee-service","source_ref":"module/fuwei-system","image_name":"committee-service","overlay":"committee-service"}]'
              ;;
            module/verification)
              include='[{"service":"verification-service","source_ref":"module/verification","image_name":"kubereats-verification","overlay":"verification-service"}]'
              ;;
            main|infra/*)
              include="$all_services"
              ;;
            module/*)
              echo "No phase-1 service mapped to ref ${ref}; skipping image build."
              include='[]'
              ;;
            *)
              include="$all_services"
              ;;
          esac

          if [[ "$include" == "[]" ]]; then
            echo "has_services=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_services=true" >> "$GITHUB_OUTPUT"
          fi

          echo "include=${include}" >> "$GITHUB_OUTPUT"
          echo "Resolved ref=${ref}, services=${include}"

  phase1-images:
    name: Build ${{ matrix.service }}
    needs: resolve-services
    if: ${{ needs.resolve-services.outputs.has_services == 'true' && (github.event_name == 'pull_request' || !contains(github.event.head_commit.message || '', '[skip ci]')) }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-services.outputs.include) }}
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      JWT_SECRET_KEY: test-secret-key
      APP_ENV: ci
      LOG_LEVEL: info
      PORT: "8000"
    steps:
      - name: Checkout service source
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.source_ref }}
          path: service-src

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          source_sha=$(git -C service-src rev-parse HEAD)
          short_sha="${source_sha:0:7}"
          image="ghcr.io/${owner_lc}/${{ matrix.image_name }}"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: service-src
        run: uv sync --dev

      - name: Lint
        working-directory: service-src
        run: uv run ruff check .

      - name: Test
        working-directory: service-src
        run: uv run pytest tests/ -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image on PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: service-src
          file: service-src/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Build and push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: service-src
          file: service-src/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:dev
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.source_sha }}
            org.opencontainers.image.title=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Record image tag for GitOps
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${{ steps.meta.outputs.short_sha }}" > "${{ matrix.overlay }}.tag"

      - name: Upload image tag metadata
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: image-tag-${{ matrix.service }}
          path: ${{ matrix.overlay }}.tag
          retention-days: 1

  update-gitops-dev-tags:
    name: Update dev GitOps image tags
    if: ${{ github.event_name == 'push' && needs.resolve-services.outputs.has_services == 'true' && !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    needs:
      - resolve-services
      - phase1-images
    concurrency:
      group: gitops-dev-tags
      cancel-in-progress: false
    steps:
      - name: Select GitOps branch
        id: gitops-ref
        shell: bash
        run: |
          set -euo pipefail
          gitops_ref="${GITHUB_REF_NAME}"
          if [[ "$gitops_ref" == module/* ]]; then
            gitops_ref="main"
          fi
          echo "ref=${gitops_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout GitOps branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.gitops-ref.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image tag metadata
        uses: actions/download-artifact@v4
        with:
          pattern: image-tag-*
          merge-multiple: true
          path: image-tags

      - name: Update dev image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag_files=(image-tags/*.tag)
          if (( ${#tag_files[@]} == 0 )); then
            echo "No image tag metadata found."
            exit 1
          fi

          summary=""
          python3 - <<'PY'
          import glob
          from pathlib import Path

          tag_files = sorted(glob.glob("image-tags/*.tag"))
          if not tag_files:
              raise SystemExit("No image tag metadata found.")

          summaries = []
          for tag_file in tag_files:
              overlay = Path(tag_file).stem
              short_sha = Path(tag_file).read_text().strip()
              path = Path(f"deploy/k8s/overlays/dev/{overlay}/kustomization.yaml")
              if not path.exists():
                  raise SystemExit(f"Overlay not found for {overlay}: {path}")

              text = path.read_text()
              lines = text.splitlines()
              out = []
              in_images = False
              changed = False
              for line in lines:
                  stripped = line.strip()
                  if stripped == "images:":
                      in_images = True
                      out.append(line)
                      continue
                  if in_images and stripped.startswith("newTag:"):
                      indent = line[: len(line) - len(line.lstrip())]
                      out.append(f"{indent}newTag: {short_sha}")
                      changed = True
                      in_images = False
                      continue
                  out.append(line)

              if not changed:
                  raise SystemExit(f"No images.newTag field updated in {path}")

              path.write_text("\n".join(out) + "\n")
              summaries.append(f"{overlay}={short_sha}")

          summary = ", ".join(summaries)
          Path("tag-summary.txt").write_text(summary + "\n")
          print(summary)
          PY

          summary="$(tr -d '\n' < tag-summary.txt)"
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"

      - name: Commit GitOps image tags
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): update backend image tags ${{ steps.tags.outputs.summary }} [skip ci]"
          file_pattern: deploy/k8s/overlays/dev/*/kustomization.yaml
