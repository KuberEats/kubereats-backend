name: Backend GHCR Images

on:
  pull_request:
  push:
    branches:
      - main
      - "infra/**"
      - "module/**"
    paths-ignore:
      - "deploy/k8s/overlays/dev/**/kustomization.yaml"

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: backend-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  phase1-images:
    name: Build ${{ matrix.service }}
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: merchant-service
            source_ref: module/merchant
            image_name: merchant-service
          - service: committee-service
            source_ref: module/fuwei-system
            image_name: committee-service
          - service: verification-service
            source_ref: module/verification
            image_name: kubereats-verification
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      JWT_SECRET_KEY: test-secret-key
      APP_ENV: ci
      LOG_LEVEL: info
      PORT: "8000"
    steps:
      - name: Checkout service source
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.source_ref }}
          path: service-src

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          short_sha="${GITHUB_SHA::7}"
          image="ghcr.io/${owner_lc}/${{ matrix.image_name }}"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: service-src
        run: uv sync --dev

      - name: Lint
        working-directory: service-src
        run: uv run ruff check .

      - name: Test
        working-directory: service-src
        run: uv run pytest tests/ -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image on PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: service-src
          file: service-src/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Build and push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: service-src
          file: service-src/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:dev
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Ensure GHCR package is public
        if: github.event_name == 'push'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsS             -X PATCH             -H "Accept: application/vnd.github+json"             -H "Authorization: Bearer ${GH_TOKEN}"             -H "X-GitHub-Api-Version: 2022-11-28"             "https://api.github.com/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${{ matrix.image_name }}/visibility"             -d '{"visibility":"public"}'

  update-gitops-dev-tags:
    name: Update dev GitOps image tags
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    needs: phase1-images
    steps:
      - name: Select GitOps branch
        id: gitops-ref
        shell: bash
        run: |
          set -euo pipefail
          gitops_ref="${GITHUB_REF_NAME}"
          if [[ "$gitops_ref" == module/* ]]; then
            gitops_ref="main"
          fi
          echo "ref=${gitops_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout GitOps branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.gitops-ref.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive short SHA
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update phase 1 dev image tags
        shell: bash
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: |
          set -euo pipefail
          short_sha="$SHORT_SHA"
          python3 - <<PY2
          from pathlib import Path
          overlays = [
              Path("deploy/k8s/overlays/dev/merchant-service/kustomization.yaml"),
              Path("deploy/k8s/overlays/dev/committee-service/kustomization.yaml"),
              Path("deploy/k8s/overlays/dev/verification-service/kustomization.yaml"),
          ]
          for path in overlays:
              text = path.read_text()
              lines = text.splitlines()
              out = []
              in_images = False
              changed = False
              for line in lines:
                  stripped = line.strip()
                  if stripped == "images:":
                      in_images = True
                      out.append(line)
                      continue
                  if in_images and stripped.startswith("newTag:"):
                      indent = line[: len(line) - len(line.lstrip())]
                      out.append(f"{indent}newTag: $short_sha")
                      changed = True
                      in_images = False
                      continue
                  out.append(line)
              if not changed:
                  raise SystemExit(f"No images.newTag field updated in {path}")
              path.write_text("\n".join(out) + "\n")
          PY2

      - name: Commit GitOps image tags
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): update backend image tags ${{ steps.sha.outputs.short_sha }} [skip ci]"
          file_pattern: deploy/k8s/overlays/dev/*/kustomization.yaml
