name: Python CI

on:
  push:
    branches:
      - 'module/tagging'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: PYTHONPATH=. uv run pytest

  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          short_sha="${GITHUB_SHA:0:7}"
          image="ghcr.io/${owner_lc}/tagging-service"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:dev
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=tagging-service
          cache-from: type=gha,scope=tagging-service
          cache-to: type=gha,scope=tagging-service,mode=max

  update-gitops-dev-tag:
    name: Update dev GitOps image tag
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    steps:
      - name: Checkout GitOps branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tagging dev image tag
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("deploy/k8s/overlays/dev/tagging-service/kustomization.yaml")
          short_sha = "${{ needs.docker.outputs.short_sha }}"
          text = path.read_text()
          lines = text.splitlines()
          out = []
          in_images = False
          changed = False
          for line in lines:
              stripped = line.strip()
              if stripped == "images:":
                  in_images = True
                  out.append(line)
                  continue
              if in_images and stripped.startswith("newTag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  out.append(f"{indent}newTag: {short_sha}")
                  changed = True
                  in_images = False
                  continue
              out.append(line)

          if not changed:
              raise SystemExit(f"No images.newTag field updated in {path}")

          path.write_text("\\n".join(out) + "\\n")
          PY

      - name: Commit GitOps image tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): update backend image tags tagging-service=${{ needs.docker.outputs.short_sha }} [skip ci]"
          file_pattern: deploy/k8s/overlays/dev/tagging-service/kustomization.yaml
