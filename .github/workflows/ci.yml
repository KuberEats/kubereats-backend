name: Finance Module CI

on:
  push:
    branches:
      - 'module/finance'
  pull_request:
    branches:
      - 'module/finance'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # If you needed redis or postgres for integration tests, you would add them here.
      # But since we use in-memory SQLite for unit tests, we don't need them yet.
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: uv run python -m pytest tests/
        env:
          REDIS_URL: "redis://localhost:6379"
          DATABASE_URL: "sqlite:///:memory:"
