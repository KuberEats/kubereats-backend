name: Finance Module CI

on:
  push:
    branches:
      - 'module/finance'
  pull_request:
    branches:
      - 'module/finance'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # If you needed redis or postgres for integration tests, you would add them here.
      # But since we use in-memory SQLite for unit tests, we don't need them yet.
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: uv run python -m pytest tests/
        env:
          REDIS_URL: "redis://localhost:6379"
          DATABASE_URL: "sqlite:///:memory:"

  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          short_sha="${GITHUB_SHA:0:7}"
          image="ghcr.io/${owner_lc}/finance-service"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:dev
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=finance-service
          cache-from: type=gha,scope=finance-service
          cache-to: type=gha,scope=finance-service,mode=max

  update-gitops-dev-tag:
    name: Update dev GitOps image tag
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    steps:
      - name: Checkout GitOps branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update finance dev image tag
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("deploy/k8s/overlays/dev/finance-service/kustomization.yaml")
          short_sha = "${{ needs.docker.outputs.short_sha }}"
          text = path.read_text()
          lines = text.splitlines()
          out = []
          in_images = False
          changed = False
          for line in lines:
              stripped = line.strip()
              if stripped == "images:":
                  in_images = True
                  out.append(line)
                  continue
              if in_images and stripped.startswith("newTag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  out.append(f"{indent}newTag: {short_sha}")
                  changed = True
                  in_images = False
                  continue
              out.append(line)

          if not changed:
              raise SystemExit(f"No images.newTag field updated in {path}")

          path.write_text("\\n".join(out) + "\\n")
          PY

      - name: Commit GitOps image tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): update backend image tags finance-service=${{ needs.docker.outputs.short_sha }} [skip ci]"
          file_pattern: deploy/k8s/overlays/dev/finance-service/kustomization.yaml
