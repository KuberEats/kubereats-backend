apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
data:
  EMAIL_PROVIDER: "production"
  SMTP_FROM_EMAIL: "noreply@kubereats.example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/kubereats_notification"
  REDIS_URL: "redis://redis:6379/0"
  INTERNAL_SERVICE_TOKENS: "order-service:change-me,finance-service:change-me,merchant-service:change-me,committee-service:change-me,admin-service:change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: kubereats/notification-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
    spec:
      containers:
        - name: worker
          image: kubereats/notification-service:latest
          command: ["uv", "run", "celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secret
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
spec:
  selector:
    app: notification-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-api-internal-only
spec:
  podSelector:
    matchLabels:
      app: notification-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
