# ── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: merchant-service-config
data:
  JWT_ALGORITHM: "HS256"
  # Business timezone used to define "today" for order summaries/confirmation.
  TIMEZONE: "Asia/Taipei"
  # In-cluster endpoint the service uploads through.
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "kubereats"
  # Browser-facing base URL stored in image links. Point this at your
  # external MinIO ingress, e.g. "https://minio.your-domain.com".
  MINIO_PUBLIC_URL: "http://minio:9000"
---
# ── Secret ───────────────────────────────────────────────────────────────────
# IMPORTANT: change all values before deploying to production.
apiVersion: v1
kind: Secret
metadata:
  name: merchant-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/kubereats_merchant"
  JWT_SECRET_KEY: "change-me-in-production"
  MINIO_ACCESS_KEY: "change-me-in-production"
  MINIO_SECRET_KEY: "change-me-in-production"
---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchant-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: merchant-service
  template:
    metadata:
      labels:
        app: merchant-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          # Replace with your GCP Artifact Registry path, e.g.:
          # asia-east1-docker.pkg.dev/PROJECT_ID/kubereats/merchant-service:latest
          image: kubereats/merchant-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: merchant-service-config
            - secretRef:
                name: merchant-service-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
# ── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: merchant-service
spec:
  selector:
    app: merchant-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# ── NetworkPolicy ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: merchant-service-policy
spec:
  podSelector:
    matchLabels:
      app: merchant-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
