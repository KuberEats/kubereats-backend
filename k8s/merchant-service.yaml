# ── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: merchant-service-config
data:
  JWT_ALGORITHM: "HS256"
  # Business timezone used to define "today" for order summaries/confirmation.
  TIMEZONE: "Asia/Taipei"
  # GCS bucket for menu images. Grant allUsers objectViewer so the returned
  # https://storage.googleapis.com/<bucket>/<key> URLs are publicly readable.
  GCS_BUCKET: "kubereats-menu-images"
  GCP_PROJECT: "your-gcp-project-id"
  # Path where the service-account key is mounted (see Deployment volume).
  GOOGLE_APPLICATION_CREDENTIALS: "/var/secrets/gcp/key.json"
---
# ── Secret ───────────────────────────────────────────────────────────────────
# IMPORTANT: change all values before deploying to production.
apiVersion: v1
kind: Secret
metadata:
  name: merchant-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/kubereats_merchant"
  JWT_SECRET_KEY: "change-me-in-production"
---
# ── GCP service-account key (object storage credentials) ─────────────────────
# On-prem clusters can't use Workload Identity, so the pod authenticates to
# Cloud Storage with a service-account key mounted as a file. Do NOT commit a
# real key — create this secret out-of-band from your downloaded JSON:
#
#   kubectl create secret generic merchant-gcp-sa-key \
#     --from-file=key.json=/path/to/your-sa-key.json
#
# The placeholder below lets `kubectl apply -f` succeed; replace it in your
# real environment (or skip it and run the command above instead).
apiVersion: v1
kind: Secret
metadata:
  name: merchant-gcp-sa-key
type: Opaque
stringData:
  key.json: |
    { "REPLACE_ME": "run the kubectl create secret command above" }
---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchant-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: merchant-service
  template:
    metadata:
      labels:
        app: merchant-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          # Replace with your GCP Artifact Registry path, e.g.:
          # asia-east1-docker.pkg.dev/PROJECT_ID/kubereats/merchant-service:latest
          image: kubereats/merchant-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: merchant-service-config
            - secretRef:
                name: merchant-service-secret
          volumeMounts:
            # Service-account key consumed via GOOGLE_APPLICATION_CREDENTIALS.
            - name: gcp-sa-key
              mountPath: /var/secrets/gcp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: merchant-gcp-sa-key
---
# ── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: merchant-service
spec:
  selector:
    app: merchant-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# ── NetworkPolicy ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: merchant-service-policy
spec:
  podSelector:
    matchLabels:
      app: merchant-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
