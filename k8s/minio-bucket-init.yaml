# ── One-time job: create the MinIO bucket and apply a public-read policy ──────
# Idempotent — safe to re-run on every deploy. Reuses the MinIO endpoint/bucket
# from merchant-service-config and the credentials from merchant-service-secret.
#
#   kubectl apply -f k8s/minio-bucket-init.yaml
#
# The policy below mirrors k8s/kubereats-public-read.json. If you change the
# bucket name, update both the ConfigMap ARN and MINIO_BUCKET to match.
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-bucket-policy
data:
  kubereats-public-read.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": { "AWS": ["*"] },
          "Action": ["s3:GetObject"],
          "Resource": ["arn:aws:s3:::kubereats/*"]
        }
      ]
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: minio-bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          # Pin to a specific RELEASE tag in production instead of :latest.
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for MinIO at $MINIO_ENDPOINT ..."
              until mc alias set myminio "$MINIO_ENDPOINT" \
                    "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" >/dev/null 2>&1; do
                echo "  minio not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "Connected. Ensuring bucket '$MINIO_BUCKET' exists..."
              mc mb --ignore-existing myminio/"$MINIO_BUCKET"
              echo "Applying public-read policy..."
              mc anonymous set-json /policy/kubereats-public-read.json \
                 myminio/"$MINIO_BUCKET"
              echo "Done. Current policy:"
              mc anonymous get-json myminio/"$MINIO_BUCKET"
          env:
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: merchant-service-config
                  key: MINIO_ENDPOINT
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: merchant-service-config
                  key: MINIO_BUCKET
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: merchant-service-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: merchant-service-secret
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: policy
              mountPath: /policy
              readOnly: true
      volumes:
        - name: policy
          configMap:
            name: minio-bucket-policy
