version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kubereats_merchant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API (browser loads images from here)
      - "9001:9001"   # Web console (browse buckets/objects)
    volumes:
      - minio_data:/data

  # One-shot: wait for MinIO, create the bucket, make it publicly readable.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/kubereats;
      mc anonymous set download local/kubereats;
      echo 'bucket kubereats ready (public read)';
      "

  merchant-api:
    build: .
    command: sh -c "uv run python scripts/migrate.py && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/kubereats_merchant
      JWT_SECRET_KEY: dev-secret-key
      JWT_ALGORITHM: HS256
      TIMEZONE: Asia/Taipei
      # Backend uploads through the in-network endpoint...
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: kubereats
      # ...but image URLs must be reachable from the browser.
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio
    volumes:
      - .:/app

volumes:
  postgres_data:
  minio_data:
