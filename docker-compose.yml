version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kubereats_notification
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  notification-api:
    build: .
    command: sh -c "uv run python scripts/migrate.py && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/kubereats_notification
      REDIS_URL: redis://redis:6379/0
      EMAIL_PROVIDER: local
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM_EMAIL: noreply@kubereats.local
      INTERNAL_SERVICE_TOKENS: order-service:dev-order-token,finance-service:dev-finance-token,merchant-service:dev-merchant-token,committee-service:dev-committee-token,admin-service:dev-admin-token
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mailhog

  notification-worker:
    build: .
    command: sh -c "uv run python scripts/migrate.py && uv run celery -A app.worker.celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/kubereats_notification
      REDIS_URL: redis://redis:6379/0
      EMAIL_PROVIDER: local
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM_EMAIL: noreply@kubereats.local
      INTERNAL_SERVICE_TOKENS: order-service:dev-order-token,finance-service:dev-finance-token,merchant-service:dev-merchant-token,committee-service:dev-committee-token,admin-service:dev-admin-token
    depends_on:
      - postgres
      - redis
      - mailhog

volumes:
  postgres_data:
