services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kubereats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kubereats"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kubereats
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kubereats
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: ["uv", "run", "python", "-m", "app.commands.dispatch_outbox"]
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kubereats
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      INTERNAL_TASK_HANDLER_URL: http://backend:8000/internal/tasks/orders/release
    command: ["uv", "run", "python", "-m", "app.commands.consume_order_release"]
    volumes:
      - .:/app
    depends_on:
      backend:
        condition: service_started
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
