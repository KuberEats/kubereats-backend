version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kubereats_merchant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  merchant-api:
    build: .
    command: sh -c "uv run python scripts/migrate.py && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/kubereats_merchant
      JWT_SECRET_KEY: dev-secret-key
      JWT_ALGORITHM: HS256
      TIMEZONE: Asia/Taipei
      # Menu images go to a real GCS bucket. Create one with allUsers
      # objectViewer and download a service-account key for local dev.
      GCS_BUCKET: kubereats-menu-images
      GCP_PROJECT: ""
      # Mount your key at this path (see volumes below).
      GOOGLE_APPLICATION_CREDENTIALS: /var/secrets/gcp/key.json
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - .:/app
      # Point GCP_SA_KEY at your downloaded key JSON on the host, e.g.
      #   GCP_SA_KEY=~/keys/kubereats-sa.json docker compose up
      - ${GCP_SA_KEY:-./gcp-sa-key.json}:/var/secrets/gcp/key.json:ro

volumes:
  postgres_data:
