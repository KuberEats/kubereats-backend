services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend-api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    command: uv run celery -A app.tasks worker --loglevel=info -Q main-queue
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  beat:
    build: .
    command: uv run celery -A app.tasks beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build: ../kubereats-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend-api
