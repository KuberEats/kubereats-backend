version: '3.8'

services:
  # Local Postgres is removed since we are using the remote DB at 35.201.144.17
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend-api:
    build: .
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./reports:/app/reports

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./reports:/app/reports

  beat:
    build: .
    command: celery -A app.worker.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
